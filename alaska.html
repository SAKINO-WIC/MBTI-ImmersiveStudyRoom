<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>阿拉斯加海湾 — 沉浸自习室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+SC:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#6ba3d6;--glow:rgba(107,163,214,.25);
  --glass:rgba(8,18,32,.6);--border:rgba(255,255,255,.06);
  --t1:#e4eaf2;--t2:rgba(228,234,242,.5);--t3:rgba(228,234,242,.25);
  --r:16px;--rs:10px;--ease:cubic-bezier(.4,0,.2,1);
  --surface:rgba(255,255,255,.015)
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif SC',serif;
  background:linear-gradient(180deg,#020810 0%,#0a1628 30%,#0e2040 60%,#061020 100%);
  color:var(--t1);-webkit-font-smoothing:antialiased;user-select:none}
::selection{background:var(--accent);color:#0a0a0a}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

/* ── 粒子层 ── */
canvas#fx{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── 极光层 ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.12}
.aurora-band{position:absolute;width:200%;height:300px;left:-50%;
  background:linear-gradient(90deg,transparent,rgba(100,200,180,.15),rgba(80,160,220,.2),rgba(120,100,200,.15),transparent);
  filter:blur(60px);animation:auroraDrift 20s ease-in-out infinite alternate}
.aurora-band:nth-child(2){top:10%;animation-delay:-7s;animation-duration:25s;opacity:.7;
  background:linear-gradient(90deg,transparent,rgba(80,180,200,.1),rgba(100,140,220,.15),rgba(80,200,160,.1),transparent)}
@keyframes auroraDrift{0%{transform:translateX(-10%) scaleY(1)}50%{transform:translateX(5%) scaleY(1.3)}100%{transform:translateX(-5%) scaleY(.8)}}

/* ── 暗角 ── */
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(2,8,16,.6))}

/* ── 顶部 ── */
.top-bar{position:relative;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;padding:24px 32px 0;flex-shrink:0}
.clock{font-family:'DM Mono',monospace;font-size:clamp(30px,4.5vw,42px);font-weight:300;letter-spacing:3px;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.date{font-size:11px;color:var(--t2);margin-top:5px;letter-spacing:.8px}
.top-center{position:absolute;left:50%;top:24px;transform:translateX(-50%);z-index:5}
.scene-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:24px;
  background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(20px)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--glow);flex-shrink:0}
.sb-name{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:3px;font-weight:400}
.top-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ibtn{height:36px;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(20px);
  border-radius:10px;color:var(--t2);cursor:pointer;font-size:15px;display:flex;align-items:center;
  justify-content:center;transition:all .3s var(--ease);gap:5px;padding:0 10px;white-space:nowrap}
.ibtn:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.ibtn.on{color:var(--accent);border-color:rgba(107,163,214,.3)}
.ib-icon{font-size:15px}.ib-label{font-size:11px;letter-spacing:.5px}
.vol-wrap{position:relative;display:flex;align-items:center;gap:6px}
.vol-icon{cursor:pointer;font-size:13px;color:var(--t2);transition:color .2s}
.vol-icon:hover{color:var(--t1)}
.vol-slider{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.1);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--accent);cursor:pointer}

/* ── 中心 ── */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:0 20px;position:relative;z-index:10}
.timer-wrap{position:relative;width:clamp(180px,26vw,230px);aspect-ratio:1}
.timer-svg{width:100%;height:100%;transform:rotate(-90deg);filter:drop-shadow(0 0 20px var(--glow))}
.tbg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:2.5}
.tprog{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:553;stroke-dashoffset:0;transition:stroke-dashoffset .3s linear}
.timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-family:'DM Mono',monospace;font-size:clamp(38px,5.5vw,52px);font-weight:300;letter-spacing:3px;line-height:1}
.timer-lbl{font-size:11px;color:var(--t2);margin-top:5px;letter-spacing:2px}
.tctrls{display:flex;gap:12px;align-items:center;position:relative;z-index:15}
.tbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--glass);
  backdrop-filter:blur(16px);color:var(--t2);cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;transition:all .3s var(--ease);position:relative;z-index:15}
.tbtn:hover{background:rgba(255,255,255,.06);color:var(--t1);transform:scale(1.06)}
.tbtn.go{width:54px;height:54px;background:var(--accent);color:#0a0a0a;border-color:transparent;
  font-size:18px;box-shadow:0 4px 28px var(--glow)}
.tbtn.go:hover{transform:scale(1.1);box-shadow:0 6px 36px var(--glow)}
.tmodes{display:flex;gap:3px;background:var(--glass);border:1px solid var(--border);border-radius:10px;
  padding:3px;backdrop-filter:blur(16px)}
.tmode{padding:7px 16px;border:none;background:transparent;color:var(--t2);font-family:'Noto Serif SC',serif;
  font-size:12px;border-radius:7px;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.tmode.on{background:rgba(255,255,255,.06);color:var(--t1)}
.fdurs{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:4px;min-height:28px;transition:opacity .3s}
.fdurs.hide{opacity:0;pointer-events:none;height:0;margin:0;overflow:hidden}
.fdur{padding:3px 10px;border:1px solid var(--border);background:transparent;border-radius:6px;
  color:var(--t2);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;transition:all .2s}
.fdur:hover{border-color:var(--accent);color:var(--accent)}
.fdur.on{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.quote-text{max-width:460px;text-align:center;font-size:13px;color:var(--t2);font-style:italic;
  line-height:1.9;letter-spacing:.8px;min-height:24px;padding:0 20px;transition:opacity .5s}
.sessions{font-size:11px;color:var(--t3);letter-spacing:1px}
.sessions b{color:var(--accent);font-family:'DM Mono',monospace;font-weight:400}
.dg-bar{width:120px;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.dg-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s var(--ease);width:0}

/* ── 歌词 ── */
.lyrics{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;
  font-size:12px;color:rgba(228,234,242,.15);letter-spacing:2px;line-height:2.2;
  white-space:nowrap;transition:opacity 1.5s;pointer-events:none}

/* ── 底栏 ── */
.bottom-bar{position:relative;z-index:10;display:flex;justify-content:center;gap:6px;padding:18px;flex-shrink:0}
.bbtn{display:flex;align-items:center;gap:5px;padding:8px 16px;border:1px solid var(--border);
  background:var(--glass);backdrop-filter:blur(16px);border-radius:var(--rs);color:var(--t2);
  cursor:pointer;font-family:'Noto Serif SC',serif;font-size:11px;transition:all .3s var(--ease);
  letter-spacing:.8px}
.bbtn:hover{background:rgba(255,255,255,.06);color:var(--t1);transform:translateY(-2px)}
.bbtn .bi{font-size:14px}

/* ── 返回按钮 ── */
.back-btn{position:fixed;top:20px;left:20px;z-index:200;padding:8px 16px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--t2);
  cursor:pointer;font-size:12px;letter-spacing:1px;transition:all .3s;backdrop-filter:blur(10px)}
.back-btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}

/* ── 完成通知 ── */
#completeNotif{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.45);backdrop-filter:blur(12px);cursor:pointer}
#completeNotif.show{display:flex}
.cn-inner{text-align:center;transform:scale(.9) translateY(10px);transition:all .5s var(--ease);pointer-events:auto}
#completeNotif.show .cn-inner{transform:scale(1) translateY(0)}
.cn-icon{font-size:48px;color:var(--accent);margin-bottom:14px;animation:cnP 2s ease infinite}
@keyframes cnP{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.12);opacity:1}}
.cn-text{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:4px;margin-bottom:6px}
.cn-sub{font-size:13px;color:var(--t2);letter-spacing:1.5px;margin-bottom:12px}
.cn-input{width:260px;padding:9px 14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  border-radius:8px;color:var(--t1);font-size:13px;outline:none;text-align:center;transition:border-color .25s}
.cn-input:focus{border-color:var(--accent)}.cn-input::placeholder{color:var(--t3)}
.cn-hint{font-size:11px;color:var(--t3);margin-top:14px;letter-spacing:1px}

/* ── 面板 ── */
.panel-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .35s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.slide-panel{position:fixed;top:0;bottom:0;width:360px;max-width:90vw;z-index:101;
  background:rgba(8,18,32,.94);backdrop-filter:blur(30px);display:flex;flex-direction:column;
  transition:transform .45s var(--ease)}
.slide-panel.right{right:0;border-left:1px solid var(--border);transform:translateX(100%)}
.slide-panel.right.open{transform:translateX(0)}
.slide-panel.left{left:0;border-right:1px solid var(--border);transform:translateX(-100%)}
.slide-panel.left.open{transform:translateX(0)}
.sp-head{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 16px;
  border-bottom:1px solid rgba(255,255,255,.04)}
.sp-head h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:2px}
.sp-close{width:32px;height:32px;border:1px solid var(--border);background:transparent;border-radius:8px;
  color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.sp-close:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.sp-body{flex:1;overflow-y:auto;padding:20px 24px}
.todo-add{display:flex;gap:8px;margin-bottom:16px}
.todo-add input{flex:1;padding:10px 14px;border:1px solid var(--border);background:rgba(255,255,255,.03);
  border-radius:8px;color:var(--t1);font-size:14px;outline:none;transition:border-color .25s}
.todo-add input:focus{border-color:var(--accent)}
.todo-add input::placeholder{color:var(--t3)}
.todo-add button{width:40px;height:40px;border:1px solid var(--accent);background:transparent;
  color:var(--accent);border-radius:8px;font-size:20px;cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center}
.todo-add button:hover{background:var(--accent);color:#0a0a0a}
.td-list{display:flex;flex-direction:column;gap:6px}
.td-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);border-radius:8px;transition:all .25s}
.td-item:hover{background:rgba(255,255,255,.04)}
.td-ck{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;
  transition:all .25s;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.td-ck:hover{border-color:var(--accent)}
.td-item.done .td-ck{border-color:var(--accent);background:var(--accent);color:#0a0a0a}
.td-txt{flex:1;font-size:14px;transition:all .25s}
.td-item.done .td-txt{opacity:.35;text-decoration:line-through}
.td-del{width:24px;height:24px;border:none;background:transparent;color:var(--t2);cursor:pointer;
  font-size:13px;border-radius:5px;opacity:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.td-item:hover .td-del{opacity:1}
.td-del:hover{color:#e85454;background:rgba(232,84,84,.1)}
.td-stat{margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--t2);text-align:center}
.j-entry{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--surface)}
.j-time{font-size:10px;color:var(--t3);margin-bottom:4px;font-family:'DM Mono',monospace}
.j-text{font-size:13px;line-height:1.6}
.j-empty{text-align:center;padding:40px 0;color:var(--t3);font-size:13px}

/* ── 专注模式 ── */
body.focus .top-bar,body.focus .bottom-bar{opacity:0;pointer-events:none;transition:opacity .4s}
body.focus .quote-text,body.focus .sessions,body.focus .fdurs,body.focus .tmodes,.focus .lyrics{opacity:0;transition:opacity .4s}
#focusHint{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:200;opacity:0;pointer-events:none;transition:opacity .6s}
#focusHint.active{opacity:1;pointer-events:auto}
.focus-exit{padding:10px 28px;background:rgba(8,18,32,.75);border:1px solid var(--border);color:var(--t2);
  border-radius:24px;font-family:'Noto Serif SC',serif;font-size:12px;cursor:pointer;backdrop-filter:blur(16px);
  transition:all .3s;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.focus-exit:hover{background:rgba(255,255,255,.08);color:var(--t1)}

.timer-wrap.running .timer-svg{animation:tGlow 3s ease infinite}
@keyframes tGlow{0%,100%{filter:drop-shadow(0 0 20px var(--glow))}50%{filter:drop-shadow(0 0 40px var(--glow))}}

@media(max-width:768px){
  .top-bar{padding:16px 18px 0}.clock{font-size:26px}
  .scene-badge{padding:6px 12px;gap:6px}.sb-name{font-size:12px}
  .timer-wrap{width:160px}.timer-time{font-size:36px}
  .bottom-bar{gap:4px;padding:14px}.bbtn{padding:8px 12px;font-size:11px}
  .ibtn .ib-label{display:none}.ibtn{padding:0 8px;height:34px}
  .slide-panel{width:100%}.tmode{padding:7px 10px;font-size:11px}
  .lyrics{font-size:10px;bottom:60px}
}
</style>
</head>
<body>

<canvas id="fx"></canvas>
<div class="aurora"><div class="aurora-band"></div><div class="aurora-band"></div></div>
<div id="vignette"></div>

<button class="back-btn" id="btnBack">← 返回</button>

<div id="studyUI">
  <div class="top-bar">
    <div><div class="clock" id="clock">00:00</div><div class="date" id="date"></div></div>
    <div class="top-center"><div class="scene-badge"><span class="sb-dot"></span><span class="sb-name">阿拉斯加海湾</span></div></div>
    <div class="top-right">
      <div class="vol-wrap">
        <span class="vol-icon" id="volIcon">♫</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="60">
      </div>
      <button class="ibtn on" id="btnMusic" title="背景音乐"><span class="ib-icon" id="btnMusicIcon">⏸</span><span class="ib-label">音乐</span></button>
      <button class="ibtn" id="btnFocus" title="专注模式"><span class="ib-icon">⊙</span><span class="ib-label">专注</span></button>
    </div>
  </div>
  <div class="center">
    <div class="timer-wrap" id="tWrap">
      <svg class="timer-svg" viewBox="0 0 200 200"><circle class="tbg" cx="100" cy="100" r="88"/><circle class="tprog" id="tProg" cx="100" cy="100" r="88"/></svg>
      <div class="timer-inner"><div class="timer-time" id="tTime">25:00</div><div class="timer-lbl" id="tLbl">专注时间</div></div>
    </div>
    <div class="tctrls">
      <button class="tbtn" id="btnReset" title="重置">↺</button>
      <button class="tbtn go" id="btnGo" title="开始/暂停">▶</button>
      <button class="tbtn" id="btnSkip" title="跳过">⏭</button>
    </div>
    <div class="tmodes"><button class="tmode on" data-m="focus">专注</button><button class="tmode" data-m="short">短休</button><button class="tmode" data-m="long">长休</button></div>
    <div class="fdurs" id="fdurs"><span class="fdur" data-d="15">15</span><span class="fdur on" data-d="25">25</span><span class="fdur" data-d="35">35</span><span class="fdur" data-d="45">45</span><span class="fdur" data-d="50">50</span><span style="font-size:10px;color:var(--t3);letter-spacing:1px">min</span></div>
    <div class="quote-text" id="quote"></div>
    <div class="sessions">今日 <b id="sDone">0</b> / 目标 <b id="dgNum">4</b> 个番茄钟</div>
    <div class="dg-bar"><div class="dg-fill" id="dgFill"></div></div>
    <div class="lyrics" id="lyrics"></div>
  </div>
  <div class="bottom-bar">
    <button class="bbtn" id="btnTodo"><span class="bi">📝</span>待办</button>
    <button class="bbtn" id="btnJournal"><span class="bi">📖</span>日记</button>
    <button class="bbtn" id="btnAch"><span class="bi">🏆</span>成就</button>
    <button class="bbtn" id="btnEye"><span class="bi">👁</span><span id="eyeLabel">护眼</span></button>
    <button class="bbtn" id="btnFull"><span class="bi">⛶</span><span id="fsText">全屏</span></button>
  </div>
</div>

<div id="focusHint"><button class="focus-exit" id="btnExitFocus"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:feP 2s ease infinite"></span>点击退出专注模式</button></div>
<div id="completeNotif"><div class="cn-inner"><div class="cn-icon">🌊</div><div class="cn-text">专注完成</div><div class="cn-sub">辛苦了，听一首歌休息一下</div><input type="text" class="cn-input" id="cnJournalIn" placeholder="记录刚才做了什么…"><div class="cn-hint">点击任意处关闭</div></div></div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="slide-panel right" id="todoPanel"><div class="sp-head"><h2>学习待办</h2><button class="sp-close" id="todoClose">✕</button></div><div class="sp-body"><div class="todo-add"><input type="text" id="todoIn" placeholder="添加任务…"><button id="todoAddBtn">+</button></div><div class="td-list" id="tdList"></div><div class="td-stat">已完成 <b id="tdDone">0</b> / <b id="tdAll">0</b></div></div></div>
<div class="slide-panel left" id="journalPanel"><div class="sp-head"><h2>学习日记</h2><button class="sp-close" id="journalClose">✕</button></div><div class="sp-body" id="journalList"></div></div>
<div class="slide-panel right" id="achPanel"><div class="sp-head"><h2>成就</h2><button class="sp-close" id="achClose">✕</button></div><div class="sp-body"><div style="text-align:center;font-size:12px;color:var(--t2);margin-bottom:16px;letter-spacing:1px" id="achCounter"></div><div id="achList"></div></div></div>
<div id="eyeRest" style="position:fixed;inset:0;z-index:350;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s"><div style="font-size:52px;margin-bottom:16px">👁</div><div style="font-size:22px;letter-spacing:4px;margin-bottom:8px;font-family:'Cormorant Garamond',serif">休息一下眼睛</div><div style="font-size:13px;color:var(--t2);margin-bottom:20px">看看 6 米外的远处，持续 20 秒</div><div style="width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden"><div id="erFill" style="height:100%;background:var(--accent);transition:width 1s linear"></div></div></div>

<script>
var $=function(id){return document.getElementById(id)};
var todayKey=function(){return new Date().toISOString().slice(0,10)};
function hexRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

/* ── DOM 缓存 ── */
var dom={};

/* ── 全局状态 ── */
var ST={timer:{mode:'focus',total:1500,remain:1500,running:false,iv:null,sessions:0},
  todos:[],journal:[],vol:60,focusMin:25,dailyGoal:4,focus:false,
  history:{},lastQI:-1,eyeCounter:1200,theme:'dark',currentPanel:null};

var QUOTES=['"海风带着咸味吹过，所有的烦恼都随浪花散去。"',
  '"在海湾的尽头，是另一片天空。"',
  '"潮起潮落，日子一天天过去，安静而美好。"',
  '"你听，海浪在说：慢慢来，不着急。"',
  '"每一朵浪花都是一封来自远方的信。"',
  '"坐在海边，世界变得很小，心变得很大。"',
  '"阿拉斯加的海湾，是地球上最安静的角落之一。"',
  '"今天的努力，是明天的潮汐，终会到达彼岸。"'];

var LYRICS=['我们总是在寻找一片海','一片属于自己的海湾',
  '在那里可以放下所有','只听海浪的声音',
  '潮起潮落间','时间悄悄流过',
  '愿你在自己的海湾','找到内心的平静'];

/* ── 粒子系统 ── */
function ParticleCanvas(c){var s=this;s.c=c;s.x=c.getContext('2d');s.p=[];s.aid=null;
  window.addEventListener('resize',function(){c.width=innerWidth;c.height=innerHeight})}
ParticleCanvas.prototype.set=function(t){
  this.p=[];var W=this.c.width=innerWidth,H=this.c.height=innerHeight,p=this.p;
  if(t==='waves'){for(var i=0;i<6;i++)p.push({y:H*.35+i*25,amp:8+i*3,freq:.008-i*.0005,speed:.0003+i*.0001,phase:Math.random()*6.28,o:.04+i*.01})}
  else if(t==='snow'){for(var i=0;i<80;i++)p.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,vy:Math.random()*.4+.1,vx:(Math.random()-.5)*.3,o:Math.random()*.25+.05,ph:Math.random()*6.28})}
  else if(t==='ice'){for(var i=0;i<40;i++)p.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,o:0,ph:Math.random()*6.28,sp:Math.random()*.02+.005})}};
ParticleCanvas.prototype.draw=function(){
  var W=this.c.width,H=this.c.height,ctx=this.x,now=Date.now();
  ctx.clearRect(0,0,W,H);
  for(var i=0;i<this.p.length;i++){var p=this.p[i];
    if(this.p.length>0&&p.amp!==undefined){
      ctx.beginPath();ctx.moveTo(0,p.y);
      for(var x=0;x<W;x+=3){var y=p.y+Math.sin(x*p.freq+now*p.speed+p.phase)*p.amp;ctx.lineTo(x,y)}
      ctx.strokeStyle='rgba(107,163,214,'+p.o+')';ctx.lineWidth=1.5;ctx.stroke()
    }else if(p.vy!==undefined&&p.r>1){
      p.x+=p.vx+Math.sin(now*.001+p.ph)*.15;p.y+=p.vy;
      if(p.y>H+5){p.y=-5;p.x=Math.random()*W}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle='rgba(220,235,250,'+p.o+')';ctx.fill()
    }else{
      p.ph+=p.sp;p.o=Math.max(0,Math.sin(p.ph))*.4;
      if(p.o<.02){p.x=Math.random()*W;p.y=Math.random()*H}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r||1,0,6.28);ctx.fillStyle='rgba(160,210,255,'+p.o+')';ctx.fill()
    }
  }
  var s=this;this.aid=requestAnimationFrame(function(){s.draw()})};
ParticleCanvas.prototype.start=function(){this.c.width=innerWidth;this.c.height=innerHeight;
  if(this.aid)cancelAnimationFrame(this.aid);this.aid=null;this.draw()};

var fx=new ParticleCanvas(document.getElementById('fx'));

/* ── BGM ── */
var bgmAudio=new Audio('music/main-bgm/GulfofAlaska.mp3');
bgmAudio.loop=true;bgmAudio.volume=ST.vol/100*0.5;bgmAudio.preload='auto';
var bgmPlaying=false;

function playBGM(){if(bgmPlaying)return;bgmPlaying=true;bgmAudio.play().catch(function(){})}
function pauseBGM(){bgmPlaying=false;bgmAudio.pause()}

/* ── 工具函数 ── */
function updClock(){var n=new Date();var h=n.getHours(),m=n.getMinutes();
  dom.clock.textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  var ds=['日','一','二','三','四','五','六'];
  dom.date.textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+ds[n.getDay()]}
function updTimerDisplay(){var m=Math.floor(ST.timer.remain/60),s=ST.timer.remain%60;
  dom.tTime.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  dom.tProg.style.strokeDashoffset=553*(1-ST.timer.remain/ST.timer.total);
  var lb={focus:'专注时间',short:'短休时间',long:'长休休息'};dom.tLbl.textContent=lb[ST.timer.mode]}
function updDailyGoal(){var today=todayKey();var done=ST.history[today]||0;
  dom.sDone.textContent=done;dom.dgNum.textContent=ST.dailyGoal;
  dom.dgFill.style.width=Math.min(done/ST.dailyGoal*100,100)+'%'}
function updDurBtns(){var bs=document.querySelectorAll('.fdur');
  for(var i=0;i<bs.length;i++)bs[i].classList.toggle('on',parseInt(bs[i].getAttribute('data-d'))===ST.focusMin)}
function getFocusTotal(){return ST.focusMin*60}
function showQuote(){var i;do{i=Math.floor(Math.random()*QUOTES.length)}while(i===ST.lastQI&&QUOTES.length>1);
  ST.lastQI=i;dom.quote.textContent=QUOTES[i]}

var lyricIdx=0;
function cycleLyric(){dom.lyrics.textContent=LYRICS[lyricIdx];dom.lyrics.style.opacity='1';
  setTimeout(function(){dom.lyrics.style.opacity='0'},4000);
  setTimeout(function(){lyricIdx=(lyricIdx+1)%LYRICS.length;cycleLyric()},5000)}
setTimeout(cycleLyric,2000);

function toggleTimer(){if(ST.timer.running){stopTimer();return}
  ST.timer.running=true;dom.btnGo.textContent='⏸';dom.tWrap.classList.add('running');ST.eyeCounter=1200;
  ST.timer.iv=setInterval(function(){if(ST.timer.remain<=0){stopTimer();showCompletion();return}
    ST.timer.remain--;updTimerDisplay()},1000)}
function stopTimer(){clearInterval(ST.timer.iv);ST.timer.running=false;dom.btnGo.textContent='▶';dom.tWrap.classList.remove('running')}
function resetTimer(){stopTimer();var d={focus:getFocusTotal(),short:300,long:900};
  ST.timer.total=d[ST.timer.mode];ST.timer.remain=ST.timer.total;updTimerDisplay()}
function setTimerMode(mode){ST.timer.mode=mode;document.querySelectorAll('.tmode').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-m')===mode)});
  dom.fdurs.classList.toggle('hide',mode!=='focus');resetTimer()}
function showCompletion(){ST.timer.sessions++;var t=todayKey();if(!ST.history[t])ST.history[t]=0;ST.history[t]++;
  saveState();updDailyGoal();checkAchievements();dom.cnJournalIn.value='';dom.completeNotif.classList.add('show');
  dom.completeNotif._ac=setTimeout(function(){dom.completeNotif.classList.remove('show');saveJournal()},8000)}
function saveJournal(){var v=dom.cnJournalIn.value.trim();if(!v)return;var now=new Date();
  ST.journal.unshift({text:v,time:now.toLocaleDateString()+' '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  dom.cnJournalIn.value='';saveState();renderJournal()}
function openPanel(name){closePanel();ST.currentPanel=name;dom.panelOverlay.classList.add('open');dom[name+'Panel'].classList.add('open')}
function closePanel(){dom.panelOverlay.classList.remove('open');if(ST.currentPanel)dom[ST.currentPanel+'Panel'].classList.remove('open');ST.currentPanel=null}
function renderTodo(){var list=dom.tdList;list.innerHTML='';for(var i=0;i<ST.todos.length;i++){
  var t=ST.todos[i],d=document.createElement('div');d.className='td-item'+(t.done?' done':'');
  d.innerHTML='<div class="td-ck" data-i="'+i+'">'+(t.done?'✓':'')+'</div><div class="td-txt">'+t.text+'</div><div class="td-del" data-i="'+i+'">✕</div>';
  list.appendChild(d)}
  list.querySelectorAll('.td-ck').forEach(function(el){el.onclick=function(){var idx=parseInt(this.getAttribute('data-i'));ST.todos[idx].done=!ST.todos[idx].done;renderTodo();saveState()}});
  list.querySelectorAll('.td-del').forEach(function(el){el.onclick=function(){ST.todos.splice(parseInt(this.getAttribute('data-i')),1);renderTodo();saveState()}});
  var dn=0;for(var x=0;x<ST.todos.length;x++)if(ST.todos[x].done)dn++;dom.tdDone.textContent=dn;dom.tdAll.textContent=ST.todos.length}
function renderJournal(){var wrap=dom.journalList;if(!ST.journal.length){wrap.innerHTML='<div class="j-empty">暂无学习日记</div>';return}
  var h='';for(var i=0;i<ST.journal.length;i++){var e=ST.journal[i];h+='<div class="j-entry"><div class="j-time">'+e.time+'</div><div class="j-text">'+e.text+'</div></div>'}wrap.innerHTML=h}
function loadState(){try{var v=JSON.parse(localStorage.getItem('alaska_room_v1'));
  if(v){ST.todos=v.todos||[];ST.journal=v.journal||[];if(v.vol!=null)ST.vol=v.vol;
  if(v.fm)ST.focusMin=v.fm;if(v.dg)ST.dailyGoal=v.dg;ST.history=v.history||{};}}catch(e){}}
function saveState(){try{localStorage.setItem('alaska_room_v1',JSON.stringify({todos:ST.todos,journal:ST.journal,
  vol:ST.vol,fm:ST.focusMin,dg:ST.dailyGoal,history:ST.history}));}catch(e){}}

/* ── 启动 ── */
document.addEventListener('DOMContentLoaded',function(){
  dom.clock=$('clock');dom.date=$('date');dom.tTime=$('tTime');dom.tProg=$('tProg');
  dom.tLbl=$('tLbl');dom.tWrap=$('tWrap');dom.btnGo=$('btnGo');dom.btnReset=$('btnReset');
  dom.btnSkip=$('btnSkip');dom.fdurs=$('fdurs');dom.quote=$('quote');dom.sDone=$('sDone');
  dom.dgNum=$('dgNum');dom.dgFill=$('dgFill');dom.volSlider=$('volSlider');dom.volIcon=$('volIcon');
  dom.btnMusic=$('btnMusic');dom.btnMusicIcon=$('btnMusicIcon');dom.btnFocus=$('btnFocus');
  dom.btnTodo=$('btnTodo');dom.btnJournal=$('btnJournal');dom.btnAch=$('btnAch');
  dom.btnEye=$('btnEye');dom.btnFull=$('btnFull');
  dom.panelOverlay=$('panelOverlay');
  dom.todoPanel=$('todoPanel');dom.todoClose=$('todoClose');dom.journalPanel=$('journalPanel');
  dom.journalClose=$('journalClose');dom.achPanel=$('achPanel');
  dom.tdList=$('tdList');dom.tdDone=$('tdDone');
  dom.tdAll=$('tdAll');dom.todoIn=$('todoIn');dom.todoAddBtn=$('todoAddBtn');
  dom.journalList=$('journalList');dom.focusHint=$('focusHint');dom.btnExitFocus=$('btnExitFocus');
  dom.completeNotif=$('completeNotif');dom.cnJournalIn=$('cnJournalIn');dom.lyrics=$('lyrics');
  dom.achCounter=$('achCounter');dom.achList=$('achList');

  loadState();fx.set('waves');fx.start();renderTodo();renderJournal();updClock();updDailyGoal();
  updTimerDisplay();updDurBtns();showQuote();dom.volSlider.value=ST.vol;
  dom.fdurs.classList.toggle('hide',ST.timer.mode!=='focus');

  setInterval(updClock,10000);setInterval(showQuote,30000);

  /* 自动播放 BGM（浏览器限制处理） */
  function tryPlayBGM(){
    bgmAudio.muted=false;bgmAudio.volume=ST.vol/100*0.5;
    bgmAudio.play().then(function(){bgmPlaying=true;dom.btnMusicIcon.textContent='⏸';dom.btnMusic.classList.add('on')}).catch(function(){
      bgmAudio.muted=true;bgmAudio.play().then(function(){
        document.addEventListener('click',function unmute(){bgmAudio.muted=false;bgmAudio.volume=ST.vol/100*0.5;bgmPlaying=true;dom.btnMusicIcon.textContent='⏸';dom.btnMusic.classList.add('on');document.removeEventListener('click',unmute)},{once:true})
      }).catch(function(){})
    })
  }
  setTimeout(tryPlayBGM,500);

  /* 计时器 */
  dom.btnGo.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();toggleTimer()});
  dom.btnReset.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();resetTimer()});
  dom.btnSkip.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();
    if(ST.timer.running){ST.timer.remain=1}else{ST.timer.remain=0;updTimerDisplay();showCompletion()}});
  document.querySelectorAll('.tmode').forEach(function(btn){btn.addEventListener('click',function(){setTimerMode(this.getAttribute('data-m'))})});
  document.querySelectorAll('.fdur').forEach(function(btn){btn.addEventListener('click',function(){
    ST.focusMin=parseInt(this.getAttribute('data-d'));updDurBtns();saveState();
    if(ST.timer.mode==='focus'&&!ST.timer.running){ST.timer.total=getFocusTotal();ST.timer.remain=getFocusTotal();updTimerDisplay()}})});

  /* 面板 */
  dom.btnTodo.addEventListener('click',function(){openPanel('todo');renderTodo()});
  dom.btnJournal.addEventListener('click',function(){openPanel('journal');renderJournal()});
  dom.btnAch.addEventListener('click',function(){openPanel('ach');renderAchievements()});
  dom.todoClose.addEventListener('click',closePanel);dom.journalClose.addEventListener('click',closePanel);dom.achClose=$('achClose');dom.achClose.addEventListener('click',closePanel);
  dom.panelOverlay.addEventListener('click',closePanel);
  function addTodo(){var v=dom.todoIn.value.trim();if(!v)return;ST.todos.push({text:v,done:false});dom.todoIn.value='';renderTodo();saveState()}
  dom.todoAddBtn.addEventListener('click',addTodo);dom.todoIn.addEventListener('keydown',function(e){if(e.key==='Enter')addTodo()});

  /* 音量 */
  dom.volSlider.addEventListener('input',function(){ST.vol=parseInt(this.value);
    bgmAudio.volume=ST.vol/100*0.5;saveState()});

  /* 音乐开关 */
  dom.btnMusic.addEventListener('click',function(){
    if(bgmPlaying){pauseBGM();dom.btnMusicIcon.textContent='▶';this.classList.remove('on')}
    else{playBGM();dom.btnMusicIcon.textContent='⏸';this.classList.add('on')}});

  /* 护眼提醒 */
  var eyeRestOn=true,eyeCounter=1200,eyeRestActive=false;
  dom.btnEye.addEventListener('click',function(){eyeRestOn=!eyeRestOn;this.classList.toggle('on',eyeRestOn);
    if(!eyeRestOn)dom.eyeLabel.textContent='护眼'});
  dom.btnEye.classList.toggle('on',eyeRestOn);
  function showEyeRest(){if(eyeRestActive)return;eyeRestActive=true;var er=$('eyeRest');er.style.opacity='1';er.style.pointerEvents='auto';
    var fill=$('erFill'),sec=20;fill.style.width='100%';
    var iv=setInterval(function(){sec--;fill.style.width=(sec/20*100)+'%';if(sec<=0){eyeRestActive=false;er.style.opacity='0';er.style.pointerEvents='none';clearInterval(iv)}},1000)}

  /* 全屏 */
  dom.btnFull.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();
    var doc=document,el=doc.documentElement;
    var isFs=!!(doc.fullscreenElement||doc.webkitFullscreenElement||doc.mozFullScreenElement||doc.msFullscreenElement);
    if(!isFs){(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el).catch(function(){})}
    else{(doc.exitFullscreen||doc.webkitExitFullscreen||doc.mozCancelFullScreen||doc.msExitFullscreen).call(doc).catch(function(){})}});
  function updFS(){var isFs=!!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
    $('fsText').textContent=isFs?'退出全屏':'全屏'}
  document.addEventListener('fullscreenchange',updFS);document.addEventListener('webkitfullscreenchange',updFS);

  /* 成就系统 */
  var ACHS=[{id:'first',icon:'🍅',name:'第一颗番茄',desc:'完成第一个番茄钟'},{id:'ten',icon:'🌱',name:'初心者',desc:'累计完成10个'},{id:'fifty',icon:'🔥',name:'专注达人',desc:'累计完成50个'},{id:'goal',icon:'🎯',name:'今日达标',desc:'完成今日目标'}];
  var achUnlocked=JSON.parse(localStorage.getItem('alaska_ach')||'[]');
  function checkAchievements(){var s=ST.timer.sessions,today=todayKey(),unlocked=[];
    if(s>=1)unlocked.push('first');if(s>=10)unlocked.push('ten');if(s>=50)unlocked.push('fifty');
    if((ST.history[today]||0)>=ST.dailyGoal)unlocked.push('goal');
    for(var i=0;i<unlocked.length;i++){if(achUnlocked.indexOf(unlocked[i])===-1){achUnlocked.push(unlocked[i]);showAchToast(unlocked[i])}}
    localStorage.setItem('alaska_ach',JSON.stringify(achUnlocked))}
  function showAchToast(id){for(var i=0;i<ACHS.length;i++){if(ACHS[i].id===id){var a=ACHS[i];
    var t=document.createElement('div');t.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:500;display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(8,18,32,.92);border:1px solid rgba(107,163,214,.3);border-radius:14px;backdrop-filter:blur(20px);opacity:0;transition:all .5s;box-shadow:0 8px 32px rgba(0,0,0,.4)';
    t.innerHTML='<span style="font-size:28px">'+a.icon+'</span><div><div style="font-size:14px;font-weight:500;margin-bottom:2px">成就解锁: '+a.name+'</div><div style="font-size:11px;color:var(--t3)">'+a.desc+'</div></div>';
    document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)'});
    setTimeout(function(){t.style.opacity='0';setTimeout(function(){document.body.removeChild(t)},500)},4000);break}}}
  function renderAchievements(){dom.achCounter.textContent='已解锁 '+achUnlocked.length+' / '+ACHS.length;
    var h='';for(var i=0;i<ACHS.length;i++){var a=ACHS[i],unlocked=achUnlocked.indexOf(a.id)!==-1;
    h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;opacity:'+(unlocked?1:.25)+';'+(unlocked?'background:var(--surface)':'')+'"><span style="font-size:24px;width:36px;text-align:center">'+(unlocked?a.icon:'🔒')+'</span><div><div style="font-size:13px;font-weight:500;margin-bottom:2px">'+a.name+'</div><div style="font-size:11px;color:var(--t3)">'+a.desc+'</div></div></div>'}
    dom.achList.innerHTML=h}

  /* 专注模式 */
  dom.btnFocus.addEventListener('click',function(){ST.focus=!ST.focus;document.body.classList.toggle('focus',ST.focus);
    if(ST.focus){dom.focusHint.classList.add('active');setTimeout(function(){dom.focusHint.classList.remove('active')},2500)}
    else dom.focusHint.classList.remove('active')});
  dom.btnExitFocus.addEventListener('click',function(e){e.stopPropagation();ST.focus=false;
    document.body.classList.remove('focus');dom.focusHint.classList.remove('active')});

  /* 返回 */
  $('btnBack').addEventListener('click',function(){
    pauseBGM();window.location.href='index.html'});

  /* 完成通知 */
  dom.completeNotif.addEventListener('click',function(e){
    if(e.target.tagName!=='INPUT'){clearTimeout(this._ac);saveJournal();this.classList.remove('show')}});

  /* 键盘 */
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT')return;
    if(e.code==='Space'){e.preventDefault();toggleTimer()}
    else if(e.code==='KeyR')resetTimer();
    else if(e.code==='KeyF')dom.btnFocus.click();
    else if(e.code==='Escape'){if(dom.completeNotif.classList.contains('show'))dom.completeNotif.classList.remove('show');else if(ST.currentPanel)closePanel();else if(ST.focus)dom.btnExitFocus.click()}});

  /* 视差 */
  document.addEventListener('mousemove',function(e){
    var x=(e.clientX/innerWidth-.5)*6,y=(e.clientY/innerHeight-.5)*6;
    dom.lyrics.style.transform='translateX(calc(-50% + '+x+'px)) translateY('+y+'px)'});

  /* beforeunload */
  window.addEventListener('beforeunload',function(){pauseBGM()});
});
</script>
</body>
